<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISM - Indice Sopravvivenza Maturità</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --danger-color: #f85149;
            --success-color: #3fb950;
            --warning-color: #d29922;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .card h2 {
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }

        .stat-box {
            background: #21262d;
            padding: 15px;
            border-radius: 6px;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .message-input textarea {
            width: 100%;
            height: 80px;
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
        }

        .message-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .wall {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .msg-post {
            background: #21262d;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent-color);
        }

        .msg-post.anon {
            border-left: 4px solid var(--warning-color);
        }

        .msg-author {
            color: var(--accent-color);
            font-size: 0.8rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .msg-author.anon {
            color: var(--warning-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ISM - Indice di Sopravvivenza Maturità</h1>
        <p>Dashboard di controllo e monitoraggio dello stato psicofisico della classe</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Media della Classe</h2>
            <div class="stat-grid">
                <div class="stat-box">
                    <div>Stress Medio</div>
                    <div class="stat-val" id="lbl-stress">-</div>
                </div>
                <div class="stat-box">
                    <div>Ansia Media</div>
                    <div class="stat-val" id="lbl-ansia">-</div>
                </div>
                <div class="stat-box">
                    <div>Sonno Medio</div>
                    <div class="stat-val" id="lbl-sonno">-</div>
                </div>
                <div class="stat-box">
                    <div>Studio Medio</div>
                    <div class="stat-val" id="lbl-studio">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Muro dei Messaggi della Classe</h2>
            <div class="message-input">
                <textarea id="txt-messaggio" placeholder="Lascia un messaggio di incoraggiamento (o disperazione)..."></textarea>
                <div class="message-controls">
                    <label>
                        <input type="checkbox" id="chk-anonimo"> Invia come Anonimo
                    </label>
                    <button onclick="inviaMessaggio()">Pubblica</button>
                </div>
            </div>
            <div class="wall" id="muro-container">
                </div>
        </div>
    </div>
</div>

<script>
    // Al caricamento della pagina scarica i dati aggiornati dal database
    window.addEventListener('DOMContentLoaded', () => {
        caricaStatistiche();
        caricaMessaggi();
    });

    // 1. Recupera le statistiche medie dal backend e aggiorna l'interfaccia
    async function caricaStatistiche() {
        try {
            const response = await fetch('/api/statistiche');
            const dati = await response.json();

            if (response.ok) {
                // Arrotonda a un decimale per una visualizzazione pulita
                document.getElementById('lbl-stress').innerText = dati.stress_medio ? dati.stress_medio.toFixed(1) : '-';
                document.getElementById('lbl-ansia').innerText = dati.ansia_media ? dati.ansia_media.toFixed(1) : '-';
                document.getElementById('lbl-sonno').innerText = dati.sonno_medio ? dati.sonno_medio.toFixed(1) + 'h' : '-';
                document.getElementById('lbl-studio').innerText = dati.studio_medio ? dati.studio_medio.toFixed(1) + 'h' : '-';
            }
        } catch (error) {
            console.error("Errore nel caricamento delle statistiche:", error);
        }
    }

    // 2. Recupera la lista dei messaggi e la stampa a schermo
    async function caricaMessaggi() {
        try {
            const response = await fetch('/api/messaggi');
            const messaggi = await response.json();

            const container = document.getElementById('muro-container');
            container.innerHTML = ''; // Svuota il contenitore vecchio

            if (response.ok && messaggi.length > 0) {
                messaggi.forEach(msg => {
                    const div = document.createElement('div');
                    // Applica una classe differente se il messaggio è anonimo
                    div.className = `msg-post ${msg.is_anonimo ? 'anon' : ''}`;

                    const autore = msg.is_anonimo ? "Studente Anonimo" : (msg.nickname || "Utente Sconosciuto");
                    const classeAutore = msg.is_anonimo ? "msg-author anon" : "msg-author";

                    div.innerHTML = `
                        <div class="${classeAutore}">${autore}</div>
                        <div>${escapeHTML(msg.testo)}</div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color:#8b949e;">Nessun messaggio sul muro. Scrivi qualcosa!</p>';
            }
        } catch (error) {
            console.error("Errore nel caricamento del muro:", error);
        }
    }

    // 3. Spedisce il nuovo messaggio al backend Express
    async function inviaMessaggio() {
        const inputTesto = document.getElementById('txt-messaggio');
        const chkAnonimo = document.getElementById('chk-anonimo');

        const testo = inputTesto.value.trim();
        if (!testo) return alert("Scrivi un messaggio prima di pubblicare!");

        // Payload da spedire alla rotta POST /api/messaggi
        const corpoRichiesta = {
            id_utente: 1, // Simuliamo temporaneamente l'utente loggato con ID 1 (Marco)
            testo: testo,
            is_anonimo: chkAnonimo.checked
        };

        try {
            const response = await fetch('/api/messaggi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(corpoRichiesta)
            });

            if (response.ok) {
                inputTesto.value = ''; // Resetta il campo di testo
                chkAnonimo.checked = false; // Togli la spunta dall'anonimo
                caricaMessaggi(); // Ricarica subito la lista aggiornata dal DB
            } else {
                alert("Errore durante l'invio del messaggio.");
            }
        } catch (error) {
            console.error("Errore di connessione con il server:", error);
        }
    }

    // Funzione di sicurezza per evitare attacchi XSS (iniezione di codice maligno nei messaggi)
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }
</script>

</body>
</html>
